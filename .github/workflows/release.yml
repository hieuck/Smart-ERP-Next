name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. v0.1.0)
        required: true
        default: v0.1.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'

permissions:
  contents: write
  packages: write

jobs:
  qa-release:
    name: Release certification
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smart_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d smart_erp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release certification gate
        env:
          API_KEY_HMAC_SECRET: ${{ secrets.API_KEY_HMAC_SECRET || 'release-hmac-secret' }}
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/smart_erp_test
        run: pnpm qa:release

  docker-images:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs:
      - qa-release
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate SBOM
        run: node scripts/generate-sbom.js sbom.json

      - name: Upload SBOM as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Build and push unified image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/smart-erp-next:${{ github.event.inputs.version || github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/smart-erp-next:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - qa-release
      - docker-images
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: node scripts/generate-release-notes.js

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          gh release delete "$VERSION" --yes 2>/dev/null || true
          gh release create "$VERSION" \
            --title "Smart ERP Next $VERSION" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA" \
            --draft=false
