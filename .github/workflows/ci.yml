name: CI

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smart_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d smart_erp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Check i18n keys and encoding
        run: pnpm audit:i18n

      - name: Check i18n locale parity
        run: pnpm audit:i18n-parity

      - name: Check committed secrets
        run: pnpm audit:secrets

      - name: Run commit quality gate
        run: pnpm qa:commit

      - name: Run unit tests
        run: pnpm test

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Apply database migrations + seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
        run: |
          cd packages/database && pnpm exec drizzle-kit migrate
          cd ../.. && npx tsx apps/api/src/common/seeds/main.seed.ts

      - name: Run API E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
          JWT_SECRET: ci-e2e-secret
          NODE_ENV: test
        run: pnpm test:api:e2e

      - name: Build API (nest build — full decorator metadata for @nestjs/swagger)
        run: |
          pnpm --filter @smart-erp/database build
          pnpm --filter @smart-erp/accounting build
          cd apps/api && pnpm exec nest build
          # Symlink so nest build's tsconfig-paths relative paths resolve at runtime
          mkdir -p packages
          ln -sfn "$PWD/../../packages/accounting" packages/accounting
          ln -sfn "$PWD/../../packages/database" packages/database
          ln -sfn "$PWD/../../packages/types" packages/types

      - name: Start servers & run Playwright E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
          JWT_SECRET: ci-e2e-secret
          NEXT_PUBLIC_API_URL: http://localhost:3456
          NODE_ENV: test
          LOGIN_RATE_LIMIT: '1000'
        run: |
          # Start pre-built API server (nest build + symlinks for path resolution)
          echo "::group::Starting API server..."
          node apps/api/dist/apps/api/src/main.js > /tmp/api-server.log 2>&1 &
          API_PID=$!
          echo "API PID: $API_PID"
          
          # Wait for API health endpoint (up to 30s — pre-built starts fast)
          for i in $(seq 1 6); do
            if curl -s http://localhost:3456/health > /dev/null 2>&1; then
              echo "✅ API server ready (attempt $i)"
              break
            fi
            echo "Attempt $i: waiting..."
            sleep 5
            if ! kill -0 $API_PID 2>/dev/null; then
              echo "❌ API server process died"
              cat /tmp/api-server.log
              exit 1
            fi
          done
          echo "::endgroup::"
          
          # Start Web dev server in background
          echo "::group::Starting Web server..."
          pnpm --filter @smart-erp/web dev --port 3457 > /tmp/web-server.log 2>&1 &
          WEB_PID=$!
          echo "Web PID: $WEB_PID"
          
          # Wait for Web login page
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3457/login 2>/dev/null | grep -q "200\|302"; then
              echo "✅ Web server ready (attempt $i)"
              break
            fi
            echo "Attempt $i: waiting..."
            sleep 5
            if ! kill -0 $WEB_PID 2>/dev/null; then
              echo "❌ Web server process died"
              cat /tmp/web-server.log
              exit 1
            fi
          done
          echo "::endgroup::"
          
          # Run Playwright tests
          echo "::group::Running Playwright E2E tests..."
          pnpm test:e2e
          EXIT_CODE=$?
          echo "::endgroup::"
          
          # Show server logs on failure
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::group::API server log (last 50 lines)"
            tail -50 /tmp/api-server.log 2>/dev/null || echo "(empty)"
            echo "::endgroup::"
            echo "::group::Web server log (last 50 lines)"
            tail -50 /tmp/web-server.log 2>/dev/null || echo "(empty)"
            echo "::endgroup::"
          fi
          
          exit $EXIT_CODE
