name: CI

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Build workspace
    runs-on: ubuntu-latest
    env:
      API_KEY_HMAC_SECRET: ci-hmac-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages and apps
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/api/dist
            apps/web/dist
            apps/web/.next
            packages/*/dist
            packages/accounting/.turbo
            packages/shared/.next
          retention-days: 1

  typecheck-lint-i18n:
    name: Type check, i18n and commit quality
    runs-on: ubuntu-latest
    env:
      API_KEY_HMAC_SECRET: ci-hmac-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Check i18n keys and encoding
        run: pnpm audit:i18n

      - name: Check i18n locale parity
        run: pnpm audit:i18n-parity

      - name: Run commit quality gate
        run: pnpm qa:commit

      - name: Audit test directory layout
        run: pnpm audit:test-layout

  encoding-audit:
    name: File encoding, BOM and mojibake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check file encoding
        run: pnpm audit:encoding

  secret-audit:
    name: Committed secrets check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check committed secrets
        run: pnpm audit:secrets

  security-audit:
    name: Dependency and filesystem security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check dependency vulnerabilities
        run: pnpm audit --audit-level=high

      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          hide-progress: true
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          limit-severities-for-sarif: true
        continue-on-error: true

      - name: Upload Trivy SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Enforce Trivy vulnerability gate
        if: steps.trivy.outcome == 'failure'
        run: |
          echo "Trivy found HIGH/CRITICAL vulnerabilities. SARIF was uploaded before failing the job."
          exit 1

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    env:
      API_KEY_HMAC_SECRET: ci-hmac-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Run unit tests
        run: pnpm test

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: build
    env:
      API_KEY_HMAC_SECRET: ci-hmac-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smart_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d smart_erp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Apply database migrations + seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
          SEED_ADMIN_PASSWORD: admin123
        run: |
          cd packages/database && pnpm exec drizzle-kit migrate
          cd ../.. && npx tsx apps/api/src/common/seeds/main.seed.ts

      - name: Run API E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
          JWT_SECRET: ci-e2e-secret-with-adequate-length
          NODE_ENV: test
        run: pnpm test:api:e2e

      - name: Start API servers and run Playwright E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_erp_test
          JWT_SECRET: ci-e2e-secret-with-adequate-length
          SEED_ADMIN_PASSWORD: admin123
          NEXT_PUBLIC_API_URL: http://localhost:3456
          NODE_ENV: test
          LOGIN_RATE_LIMIT: '1000'
          PORT: '3456'
        run: |
          # Manual server startup (Playwright webServer having exit code 2 issues)
          # Pre-built accounting/database dist needed for require.resolve in NestJS compiler hook
          echo "::group::Building workspace packages..."
          mkdir -p node_modules/@smart-erp
          for d in packages/*/; do
            name="$(basename "$d")"
            rm -rf "node_modules/@smart-erp/$name"
            ln -sfn "$PWD/$d" "node_modules/@smart-erp/$name"
          done
          node node_modules/.bin/tsc -p packages/database/tsconfig.json 2>/dev/null || true
          node node_modules/.bin/tsc -p packages/accounting/tsconfig.json 2>/dev/null || true
          echo "::endgroup::"
          echo "::group::Starting API server..."
          for d in packages/*/; do
            name="$(basename "$d")"
            rm -rf "node_modules/@smart-erp/$name"
            ln -sfn "$PWD/$d" "node_modules/@smart-erp/$name"
          done
          pnpm --filter @smart-erp/api dev > /tmp/api-server.log 2>&1 &
          API_PID=$!
          echo "API PID: $API_PID"
          echo "::endgroup::"

          echo "::group::Waiting for API health (up to 20 min)..."
          for i in $(seq 1 120); do
            if curl -sf http://localhost:3456/health > /dev/null 2>&1; then
              echo "✅ API ready (attempt $i)"
              break
            fi
            echo "Attempt $i"
            sleep 10
            kill -0 $API_PID 2>/dev/null || { echo "❌ API died"; cat /tmp/api-server.log; exit 1; }
          done
          echo "::endgroup::"

          echo "::group::Starting Web server..."
          pnpm --filter @smart-erp/web dev --port 3457 > /tmp/web-server.log 2>&1 &
          WEB_PID=$!
          echo "Web PID: $WEB_PID"
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3457/login 2>/dev/null | grep -q "200\|302"; then
              echo "✅ Web ready (attempt $i)"
              break
            fi
            echo "Attempt $i"
            sleep 5
            kill -0 $WEB_PID 2>/dev/null || { echo "❌ Web died"; cat /tmp/web-server.log; exit 1; }
          done
          echo "::endgroup::"

          echo "::group::Running Playwright tests..."
          API_PORT=3456 WEB_PORT=3457 pnpm test:e2e 2>&1
          EXIT_CODE=$?
          echo "::endgroup::"

          echo "::group::Running load tests..."
          API_URL=http://localhost:3456 node scripts/load-test.mjs 2>&1 || true
          echo "::endgroup::"

          [ $EXIT_CODE -ne 0 ] && {
            echo "::group::API server log (last 50)"
            tail -50 /tmp/api-server.log 2>/dev/null || echo "(empty)"
            echo "::endgroup::"
            echo "::group::Web server log (last 50)"
            tail -50 /tmp/web-server.log 2>/dev/null || echo "(empty)"
            echo "::endgroup::"
          }
          exit $EXIT_CODE

  container-scan:
    name: Container image security scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t smart-erp-next:test .

      - name: Run Trivy container image scan
        id: trivy-image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: smart-erp-next:test
          hide-progress: true
          format: sarif
          output: trivy-image-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'
          limit-severities-for-sarif: true

      - name: Upload Trivy image SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
