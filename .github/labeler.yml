api:
  - changed-files:
      - any-glob-to-any-file:
          - apps/api/**

web:
  - changed-files:
      - any-glob-to-any-file:
          - apps/web/**

database:
  - changed-files:
      - any-glob-to-any-file:
          - packages/database/**
          - packages/database/drizzle/**

schema:
  - changed-files:
      - any-glob-to-any-file:
          - packages/database/src/schema/**
          - packages/database/drizzle/**

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - docs/**

ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**
          - scripts/**

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.spec.ts"
          - "**/*.test.ts"
          - "**/__tests__/**"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - pnpm-lock.yaml
          - "**/package.json"
